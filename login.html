<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 — ComicForge 漫鍛</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif; background:#0a0a0f; color:#eee; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .card { background:#12121a; border:1px solid #1e1e2e; border-radius:20px; padding:40px; width:420px; max-width:90vw; }
        .logo { text-align:center; font-size:1.4rem; font-weight:700; margin-bottom:32px; }
        .logo span { color:#f59e0b; }
        h2 { text-align:center; margin-bottom:24px; font-size:1.3rem; }
        .tabs { display:flex; gap:0; margin-bottom:24px; border:1px solid #1e1e2e; border-radius:10px; overflow:hidden; }
        .tab { flex:1; padding:10px; text-align:center; cursor:pointer; font-size:.9rem; color:#888; transition:all .2s; }
        .tab.active { background:rgba(245,158,11,.15); color:#f59e0b; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:.85rem; color:#888; margin-bottom:6px; }
        .form-group input { width:100%; padding:12px 16px; background:rgba(0,0,0,.3); border:1px solid #1e1e2e; border-radius:10px; color:#fff; font-size:.95rem; outline:none; transition:border-color .2s; }
        .form-group input:focus { border-color:#f59e0b; }
        .btn { width:100%; padding:14px; background:#f59e0b; color:#0a0a0f; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; margin-top:8px; transition:all .2s; }
        .btn:hover { background:#e08e00; }
        .error { color:#ef4444; font-size:.85rem; text-align:center; margin-top:12px; display:none; }
        .back { text-align:center; margin-top:20px; }
        .back a { color:#888; font-size:.85rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📖 ComicForge <span>漫鍛</span></div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('login',this)">登入</div>
            <div class="tab" onclick="showTab('register',this)">註冊</div>
        </div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>密碼</label>
                <input type="password" id="loginPassword" required placeholder="輸入密碼">
            </div>
            <button type="submit" class="btn">登入</button>
            <div class="error" id="loginError"></div>
        </form>

        <form id="registerForm" style="display:none;" onsubmit="return handleRegister(event)">
            <div class="form-group">
                <label>暱稱</label>
                <input type="text" id="regName" required placeholder="你的名字">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>密碼</label>
                <input type="password" id="regPassword" required minlength="6" placeholder="至少 6 個字元">
            </div>
            <button type="submit" class="btn">建立帳號</button>
            <div class="error" id="regError"></div>
        </form>

        <div class="back"><a href="index.html">← 回到首頁</a></div>
    </div>

    <script src="config.js"></script>
    <script>
        // Already logged in? Go to app
        if (CF.isLoggedIn) window.location.href = 'app.html';

        function showTab(tab, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';
            try {
            const res = await fetch(CF.auth_api + '/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify({
                    email: document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value,
                })
            });
            const data = await res.json();
            const ok = res.ok;
                if (ok && data.success) {
                    CF.token = data.token;
                    window.location.href = 'app.html';
                } else {
                    errEl.textContent = data.error || '登入失敗';
                    errEl.style.display = 'block';
                }
            } catch(e) {
                errEl.textContent = '連線失敗，請確認後端是否啟動';
                errEl.style.display = 'block';
            }
            return false;
        }

        async function handleRegister(e) {
            e.preventDefault();
            const errEl = document.getElementById('regError');
            errEl.style.display = 'none';
            try {
            const res = await fetch(CF.auth_api + '/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify({
                    name: document.getElementById('regName').value,
                    email: document.getElementById('regEmail').value,
                    password: document.getElementById('regPassword').value,
                })
            });
            const data = await res.json();
            const ok = res.ok;
                if (ok && data.success) {
                    CF.token = data.token;
                    window.location.href = 'app.html';
                } else {
                    errEl.textContent = data.error || '註冊失敗';
                    errEl.style.display = 'block';
                }
            } catch(e) {
                errEl.textContent = '連線失敗，請確認後端是否啟動';
                errEl.style.display = 'block';
            }
            return false;
        }
    </script>
</body>
</html>
