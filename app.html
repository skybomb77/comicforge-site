<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創作 — ComicForge 漫鍛</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --bg:#0a0a0f; --panel:#12121a; --border:#1e1e2e; --text:#eee; --muted:#888; --accent:#f59e0b; --purple:#a78bfa; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); }
        a { color:var(--accent); text-decoration:none; }
        .nav { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid var(--border); }
        .nav .logo { font-weight:700; cursor:pointer; }
        .usage { font-size:.85rem; color:var(--muted); }
        .usage strong { color:var(--accent); }
        .badge { font-size:.65rem; font-weight:700; padding:3px 8px; border-radius:999px; letter-spacing:1px; background:rgba(245,158,11,.15); color:var(--accent); border:1px solid rgba(245,158,11,.3); }
        .main { display:grid; grid-template-columns:380px 1fr; gap:24px; max-width:1200px; margin:0 auto; padding:24px; }
        .panel { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:20px; }
        .panel h3 { font-size:.95rem; margin-bottom:14px; }
        .panel h3 i { color:var(--accent); margin-right:6px; }
        .char-upload { border:2px dashed var(--border); border-radius:10px; padding:24px; text-align:center; cursor:pointer; margin-bottom:14px; }
        .char-upload:hover { border-color:var(--accent); }
        .char-upload i { font-size:2rem; color:var(--accent); display:block; margin-bottom:8px; }
        .char-upload input { display:none; }
        .char-preview { text-align:center; margin-bottom:14px; }
        .char-preview img { width:120px; height:120px; object-fit:cover; border-radius:10px; border:2px solid var(--accent); }
        .char-name { font-size:.85rem; color:var(--muted); margin-top:6px; }
        .style-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:16px; }
        .style-opt { padding:10px 6px; background:rgba(0,0,0,.2); border:1px solid var(--border); border-radius:8px; text-align:center; cursor:pointer; font-size:.8rem; }
        .style-opt:hover { border-color:var(--accent); }
        .style-opt.sel { border-color:var(--accent); background:rgba(245,158,11,.08); }
        .style-opt .emoji { font-size:1.3rem; display:block; margin-bottom:4px; }
        .panel-editor { margin-bottom:12px; }
        .panel-editor .panel-num { font-size:.75rem; font-weight:700; color:var(--accent); margin-bottom:6px; }
        .panel-editor textarea { width:100%; background:rgba(0,0,0,.3); border:1px solid var(--border); border-radius:8px; padding:10px; color:#fff; font-size:.9rem; resize:vertical; min-height:50px; outline:none; margin-bottom:6px; }
        .panel-editor textarea:focus { border-color:var(--accent); }
        .panel-editor .dialogue { min-height:35px; font-size:.85rem; }
        .add-panel { width:100%; padding:10px; background:transparent; border:1px dashed var(--border); border-radius:8px; color:var(--muted); cursor:pointer; font-size:.85rem; margin-bottom:16px; }
        .add-panel:hover { border-color:var(--accent); color:var(--accent); }
        .gen-btn { width:100%; padding:14px; background:var(--accent); color:#0a0a0f; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .gen-btn:hover { background:#e08e00; }
        .gen-btn:disabled { opacity:.5; cursor:not-allowed; }
        .ai-btn { width:100%; padding:10px; background:rgba(139,92,246,.15); border:1px solid rgba(139,92,246,.3); border-radius:8px; color:var(--purple); cursor:pointer; font-size:.85rem; margin-bottom:12px; transition:all .2s; }
        .ai-btn:hover { background:rgba(139,92,246,.25); }
        .ai-btn:disabled { opacity:.5; cursor:not-allowed; }
        .premise-input { width:100%; background:rgba(0,0,0,.3); border:1px solid var(--border); border-radius:8px; padding:10px; color:#fff; font-size:.9rem; resize:vertical; min-height:60px; outline:none; margin-bottom:8px; }
        .premise-input:focus { border-color:var(--purple); }
        .ai-panel-select { flex:1; background:rgba(0,0,0,.3); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:#fff; font-size:.85rem; outline:none; }
        .result { min-height:400px; }
        .comic-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        .comic-panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
        .comic-panel img { width:100%; aspect-ratio:1; object-fit:cover; }
        .comic-panel .meta { padding:8px 10px; font-size:.75rem; color:var(--muted); }
        .empty { text-align:center; padding:60px 20px; color:var(--muted); }
        .empty i { font-size:3rem; opacity:.3; display:block; margin-bottom:12px; }
        .spin { animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .progress-text { font-size:.85rem; color:var(--muted); margin-top:8px; }
        .export-bar { display:flex; gap:8px; margin-top:12px; }
        .export-btn { flex:1; padding:8px; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:8px; color:var(--text); cursor:pointer; font-size:.8rem; text-align:center; transition:all .2s; }
        .export-btn:hover { border-color:var(--accent); background:rgba(245,158,11,.1); }
        @media(max-width:768px) { .main { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<nav class="nav">
    <div class="logo" onclick="location.href='index.html'">📖 ComicForge 漫鍛</div>
    <div style="display:flex;align-items:center;gap:14px;">
        <span class="usage" id="usageDisplay">載入中...</span>
        <span class="badge" id="planBadge">-</span>
        <a href="dashboard.html" style="font-size:.85rem;">儀表板</a>
        <a href="#" onclick="CF.logout();return false;" style="font-size:.85rem;color:var(--muted);">登出</a>
    </div>
</nav>

<div class="main">
    <div>
        <!-- Character Upload -->
        <div class="panel" style="margin-bottom:14px;">
            <h3><i class="fa-solid fa-user"></i> 角色參考圖</h3>
            <div class="char-upload" id="charUpload" onclick="document.getElementById('charInput').click()">
                <i class="fa-solid fa-user-plus"></i>
                <p style="font-size:.85rem;">上傳角色圖（保持每格一致性）</p>
                <input type="file" id="charInput" accept="image/*">
            </div>
            <div class="char-preview" id="charPreview" style="display:none;">
                <img id="charImg" src="">
                <div class="char-name" id="charName"></div>
            </div>
        </div>

        <!-- AI Script Generator -->
        <div class="panel" style="margin-bottom:14px;">
            <h3><i class="fa-solid fa-wand-magic-sparkles"></i> AI 劇本助手</h3>
            <textarea class="premise-input" id="premiseInput" placeholder="輸入故事前提，例如：一個少年意外獲得超能力，開始他的英雄之路..."></textarea>
            <div style="display:flex;gap:6px;margin-bottom:8px;">
                <select class="ai-panel-select" id="aiPanelCount">
                    <option value="4">4 格</option>
                    <option value="6">6 格</option>
                    <option value="8">8 格</option>
                    <option value="12">12 格</option>
                </select>
            </div>
            <button class="ai-btn" id="aiBtn" onclick="aiGenerate()">
                <i class="fa-solid fa-hat-wizard"></i> 自動生成分鏡
            </button>
        </div>

        <!-- Art Style -->
        <div class="panel" style="margin-bottom:14px;">
            <h3><i class="fa-solid fa-palette"></i> 漫畫風格</h3>
            <div class="style-grid" id="styleGrid">
                <div style="color:var(--muted);font-size:.85rem;">載入風格中...</div>
            </div>
        </div>

        <!-- Panels -->
        <div class="panel">
            <h3><i class="fa-solid fa-layer-group"></i> 劇本</h3>
            <div id="panelList">
                <div class="panel-editor" data-idx="0">
                    <div class="panel-num">第 1 格</div>
                    <textarea class="desc" placeholder="描述這格的場景和動作..."></textarea>
                    <textarea class="dialogue" placeholder="對話（選填）"></textarea>
                </div>
            </div>
            <button class="add-panel" onclick="addPanel()">＋ 加一格</button>
            <button class="gen-btn" id="genBtn" onclick="generate()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> 生成漫畫
            </button>
        </div>
    </div>

    <!-- Result -->
    <div class="panel">
        <h3><i class="fa-solid fa-book-open"></i> 漫畫成品</h3>
        <div class="result" id="result">
            <div class="empty">
                <i class="fa-solid fa-book"></i>
                <p>上傳角色 → 寫劇本 → 生成漫畫<br><span style="font-size:.85rem;">每格自動保持角色一致性</span></p>
            </div>
        </div>
        <div class="export-bar" id="exportBar" style="display:none;">
            <button class="export-btn" onclick="exportComic('vertical')"><i class="fa-solid fa-arrow-down"></i> 直式長圖</button>
            <button class="export-btn" onclick="exportComic('2x2')"><i class="fa-solid fa-table-cells"></i> 格狀排列</button>
            <button class="export-btn" onclick="exportComic('horizontal')"><i class="fa-solid fa-arrow-right"></i> 橫式長圖</button>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
if (!CF.requireLogin()) { /* redirect to login */ }

let selectedStyle = '';
let charFile = null;
let panelCount = 1;
let currentProjId = null;

// Init
async function init() {
    const [meRes, stylesRes] = await Promise.all([
        CF.apiFetch('/api/me'),
        CF.apiFetch('/api/styles')
    ]);
    if (meRes.ok) {
        const li = meRes.data.limit_info;
        document.getElementById('usageDisplay').innerHTML = `已用 <strong>${li.used}</strong>/${li.limit} 格`;
        document.getElementById('planBadge').textContent = li.plan.toUpperCase();
    }
    if (stylesRes.ok) {
        const styles = stylesRes.data;
        selectedStyle = styles[0].id;
        document.getElementById('styleGrid').innerHTML = styles.map((s, i) => `
            <div class="style-opt ${i === 0 ? 'sel' : ''}" data-style="${s.id}" onclick="selStyle(this)">
                <span class="emoji">${s.preview}</span>
                ${s.name}
            </div>
        `).join('');
    } else {
        // Fallback styles
        const fb = [
            { id: 'manga_bw', name: '日系黑白', preview: '🖊️' },
            { id: 'manga_color', name: '彩色動畫', preview: '🎨' },
            { id: 'webtoon', name: '韓系條漫', preview: '📱' },
            { id: 'comic_west', name: '美式英雄', preview: '🦸' },
            { id: 'watercolor', name: '水彩繪本', preview: '🖌️' },
            { id: 'chibi', name: 'Q版可愛', preview: '🐣' }
        ];
        selectedStyle = fb[0].id;
        document.getElementById('styleGrid').innerHTML = fb.map((s, i) => `
            <div class="style-opt ${i === 0 ? 'sel' : ''}" data-style="${s.id}" onclick="selStyle(this)">
                <span class="emoji">${s.preview}</span>
                ${s.name}
            </div>
        `).join('');
    }
}
init();

// Character upload
document.getElementById('charInput').addEventListener('change', async e => {
    if (!e.target.files.length) return;
    charFile = e.target.files[0];
    const fd = new FormData();
    fd.append('image', charFile);
    fd.append('name', '我的角色');
    const { ok, data } = await CF.apiFetch('/api/character/upload', { method: 'POST', body: fd });
    if (ok && data.success) {
        document.getElementById('charImg').src = CF.api + data.image;
        document.getElementById('charName').textContent = data.name;
        document.getElementById('charUpload').style.display = 'none';
        document.getElementById('charPreview').style.display = 'block';
        window._charId = data.id;
    }
});

function selStyle(el) {
    document.querySelectorAll('.style-opt').forEach(s => s.classList.remove('sel'));
    el.classList.add('sel');
    selectedStyle = el.dataset.style;
}

function addPanel() {
    panelCount++;
    const div = document.createElement('div');
    div.className = 'panel-editor';
    div.dataset.idx = panelCount - 1;
    div.innerHTML = `
        <div class="panel-num">第 ${panelCount} 格</div>
        <textarea class="desc" placeholder="描述這格的場景和動作..."></textarea>
        <textarea class="dialogue" placeholder="對話（選填）"></textarea>
    `;
    document.getElementById('panelList').appendChild(div);
}

// Generate comic (async)
async function generate() {
    const descs = [];
    document.querySelectorAll('.panel-editor').forEach(el => {
        descs.push({
            description: el.querySelector('.desc').value,
            dialogue: el.querySelector('.dialogue').value
        });
    });
    if (!descs.some(d => d.description)) return alert('請至少輸入一格描述！');

    const btn = document.getElementById('genBtn');
    const res = document.getElementById('result');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner spin"></i> 生成中...';
    res.innerHTML = '<div class="empty"><i class="fa-solid fa-spinner spin" style="font-size:2.5rem;color:var(--accent);"></i><p>AI 正在繪製漫畫...</p><p class="progress-text" id="progressText"></p></div>';

    try {
        const { ok, data } = await CF.apiFetch('/api/comic/create-async', {
            method: 'POST',
            body: { title: '我的漫畫', style: selectedStyle, character_id: window._charId || null, panels: descs }
        });
        if (ok && data.success) {
            currentProjId = data.id;
            pollProgress(data.id);
        } else {
            showError(data.error || '生成失敗');
        }
    } catch(e) {
        showError('錯誤：' + e.message);
    }
}

function pollProgress(projId) {
    const interval = setInterval(async () => {
        try {
            const cr = await CF.apiFetch('/api/comic/' + projId);
            if (!cr.ok) return;
            const cd = cr.data;
            const pt = document.getElementById('progressText');
            if (pt) pt.textContent = `進度：${cd.completed_panels}/${cd.total_panels} 格 (${cd.progress}%)`;

            if (cd.status === 'done') {
                clearInterval(interval);
                showResult(cd);
                resetBtn();
            } else if (cd.status === 'error') {
                clearInterval(interval);
                showError('生成過程發生錯誤，請重試');
                resetBtn();
            }
        } catch(e) {}
    }, 2000);
}

function showResult(cd) {
    const res = document.getElementById('result');
    let html = '<div class="comic-grid">';
    cd.panels.forEach(p => {
        const imgUrl = p.url ? CF.api + p.url : '';
        html += `<div class="comic-panel">
            ${imgUrl ? `<img src="${imgUrl}" alt="Panel ${p.num}" loading="lazy">` : '<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);"><i class="fa-solid fa-xmark"></i></div>'}
            <div class="meta">第 ${p.num} 格 ${p.dialogue ? '· 💬 有對話' : ''}</div>
        </div>`;
    });
    html += '</div>';
    res.innerHTML = html;
    document.getElementById('exportBar').style.display = 'flex';
    // Update usage
    if (cd.limit_info) {
        document.getElementById('usageDisplay').innerHTML = `已用 <strong>${cd.limit_info.used}</strong>/${cd.limit_info.limit} 格`;
    }
}

function showError(msg) {
    document.getElementById('result').innerHTML = `<div class="empty"><p style="color:#ef4444;">${msg}</p></div>`;
}

function resetBtn() {
    const btn = document.getElementById('genBtn');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> 生成漫畫';
}

// AI Script Generation
async function aiGenerate() {
    const premise = document.getElementById('premiseInput').value.trim();
    if (!premise) return alert('請輸入故事前提！');

    const btn = document.getElementById('aiBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner spin"></i> 生成劇本中...';

    try {
        const numPanels = parseInt(document.getElementById('aiPanelCount').value);
        const { ok, data } = await CF.apiFetch('/api/script/generate', {
            method: 'POST',
            body: { premise, panels: numPanels, style: selectedStyle }
        });

        if (ok && data.success) {
            const panelList = document.getElementById('panelList');
            panelList.innerHTML = '';
            panelCount = 0;
            data.panels.forEach((p, i) => {
                panelCount++;
                const div = document.createElement('div');
                div.className = 'panel-editor';
                div.dataset.idx = i;
                div.innerHTML = `
                    <div class="panel-num">第 ${panelCount} 格</div>
                    <textarea class="desc" placeholder="描述這格的場景和動作...">${p.description || ''}</textarea>
                    <textarea class="dialogue" placeholder="對話（選填）">${p.dialogue || ''}</textarea>
                `;
                panelList.appendChild(div);
            });
        } else {
            alert(data.error || 'AI 劇本生成失敗');
        }
    } catch(e) {
        alert('錯誤：' + e.message);
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-hat-wizard"></i> 自動生成分鏡';
}

// Export
async function exportComic(layout) {
    if (!currentProjId) return alert('請先生成漫畫！');
    try {
        const { ok, data } = await CF.apiFetch(`/api/comic/${currentProjId}/export`, {
            method: 'POST',
            body: { layout }
        });
        if (ok && data.success) {
            window.open(CF.api + data.url, '_blank');
        } else {
            alert(data.error || '匯出失敗');
        }
    } catch(e) {
        alert('匯出錯誤：' + e.message);
    }
}
</script>
</body>
</html>
