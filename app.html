@app.route("/api/script/generate", methods=["POST"])
@login_required
def generate_script():
    """AI generates panel descriptions from a story premise"""
    d = request.get_json()
    premise = d.get("premise", "").strip()
    num_panels = min(int(d.get("panels", 4)), 12)  # Max 12 panels
    style_id = d.get("style", "manga_color")
    
    if not premise:
        return jsonify({"error": "請輸入故事前提"}), 400
    
    style = next((s for s in ART_STYLES if s["id"] == style_id), ART_STYLES[0])
    
    # Generate panel breakdown using simple story structure
    panels = _generate_panel_descriptions(premise, num_panels, style)
    
    return jsonify({"success": True, "panels": panels, "style": style_id})


def _generate_panel_descriptions(premise, num_panels, style):

    import re
    
    # Try calling Hermes API for smart generation
    HERMES_URL = os.environ.get("HERMES_API_URL", "http://localhost:8642/v1/chat/completions")
    HERMES_KEY = os.environ.get("HERMES_API_KEY", "wpZIYk6cmsU3KVn0")
    
    try:
        import requests as http_requests
        resp = http_requests.post(HERMES_URL, 
            headers={"Authorization": f"Bearer {HERMES_KEY}", "Content-Type": "application/json"},
            json={
                "model": "hermes",
                "messages": [
                    {"role": "system", "content": f"""你是漫畫劇本助手。根據故事前提，生成 {num_panels} 格漫畫的分鏡描述。
每格需要：
- description: 畫面描述（英文，詳細的視覺描述，包含角色動作、表情、場景、構圖）
- dialogue: 對話（中文，選填，簡短自然）

回傳 JSON 陣列格式，例如：

只回傳 JSON，不要其他文字。"""},
                    {"role": "user", "content": f"故事前提：{premise}"}
                ],
                "temperature": 0.7,
                "max_tokens": 2000
            },
            timeout=30
        )
        
        if resp.status_code == 200:
            result = resp.json()

@app.route("/api/comic/<int:proj_id>/export", methods=["POST"])
@login_required
def export_comic(proj_id):
    """Export comic as a combined strip image"""
    from PIL import Image as PILImage
    
    u = current_user()
    proj = db.session.get(ComicProject, proj_id)
    if not proj or proj.user_id != u.id:
        return jsonify({"error": "找不到"}), 404
    
    panels = Panel.query.filter_by(project_id=proj_id).order_by(Panel.panel_num).all()
    if not panels or not all(p.output_file for p in panels):
        return jsonify({"error": "漫畫尚未完成生成"}), 400
    
    layout = request.get_json().get("layout", "vertical") if request.is_json else "vertical"
    
    images = []
    for p in panels:
        path = os.path.join(app.config["UPLOAD_FOLDER"], p.output_file)
        if os.path.exists(path):
            images.append(PILImage.open(path))
    
    if not images:
        return jsonify({"error": "找不到漫畫圖片"}), 404
    
    # Combine based on layout
    gap = 8
    if layout == "vertical":
        # Webtoon style - vertical strip
        w = max(img.width for img in images)
        total_h = sum(img.height for img in images) + gap * (len(images) - 1)
        strip = PILImage.new("RGB", (w, total_h), (10, 10, 15))
        y = 0
        for img in images:
            x = (w - img.width) // 2
            strip.paste(img, (x, y))
            y += img.height + gap
    elif layout == "2x2":
        # Grid 2 columns
        cols = 2
        rows = (len(images) + cols - 1) // cols
        cell_w = max(img.width for img in images)
        cell_h = max(img.height for img in images)
        strip = PILImage.new("RGB", (cols * cell_w + gap * (cols - 1), rows * cell_h + gap * (rows - 1)), (10, 10, 15))
        for i, img in enumerate(images):
            row, col = i // cols, i % cols
            x = col * (cell_w + gap)
            y = row * (cell_h + gap)
            strip.paste(img, (x, y))
    else:  # horizontal
        total_w = sum(img.width for img in images) + gap * (len(images) - 1)
        h = max(img.height for img in images)
        strip = PILImage.new("RGB", (total_w, h), (10, 10, 15))
        x = 0
        for img in images:
            y = (h - img.height) // 2
            strip.paste(img, (x, y))
            x += img.width + gap
    
    # Save strip
    export_name = f"comic_strip_{proj_id}_{layout}.png"
    export_path = os.path.join(app.config["UPLOAD_FOLDER"], export_name)
    strip.save(export_path, quality=95)
    
    return jsonify({
        "success": True,
        "url": f"/api/image/{export_name}",
        "width": strip.width,
        "height": strip.height
    })

import threading
_gen_lock = threading.Lock()

@app.route("/api/comic/create-async", methods=["POST"])
@login_required
def create_comic_async():
    """Create comic with async background generation (non-blocking)"""
    u = current_user()
    d = request.get_json()

    title = d.get("title", "我的漫畫")
    style_id = d.get("style", "manga_color")
    character_id = d.get("character_id")
    panels_desc = d.get("panels", [])

    if not panels_desc:
        return jsonify({"error": "請輸入至少一格漫畫描述"}), 400
    panels_needed = len(panels_desc)
    if u.panels_used + panels_needed > u.panels_limit:
        return jsonify({"error": f"額度不足！需要 {panels_needed} 格，剩餘 {u.panels_limit - u.panels_used} 格", "limit_info": u.limit_info()}), 402

    proj = ComicProject(
        user_id=u.id, title=title, style=style_id,
        character_id=character_id,
        panels_json=json.dumps(panels_desc, ensure_ascii=False),
        status="generating",
        total_panels=panels_needed,
        completed_panels=0,
        progress=0
    )
    db.session.add(proj)
    db.session.commit()

    for i, pd in enumerate(panels_desc):
        p = Panel(project_id=proj.id, panel_num=i + 1,
                  description=pd.get("description", ""),
                  dialogue=pd.get("dialogue", ""))
        db.session.add(p)
    db.session.commit()

    # Reserve panels
    u.panels_used += panels_needed
    db.session.commit()

    # Start background generation
    def _bg_generate():
        with _gen_lock:
            with app.app_context():
                style = next((s for s in ART_STYLES if s["id"] == style_id), ART_STYLES[0])
                char = db.session.get(Character, character_id) if character_id else None
                try:
                    generate_all_panels(proj.id, style, char)
                    p = db.session.get(ComicProject, proj.id)
                    p.status = "done"
                    p.progress = 100
                    p.completed_panels = panels_needed
                    db.session.commit()
                except Exception as e:
                    print(f"[ComicForge] Async generation error: {e}")
                    p = db.session.get(ComicProject, proj.id)
                    p.status = "error"
                    db.session.commit()

    thread = threading.Thread(target=_bg_generate, daemon=True)
    thread.start()

    return jsonify({"success": True, "id": proj.id, "status": "generating", "panels": panels_needed})

<script>
if (!CF.requireLogin()) throw '';

let selectedStyle = '';
let charFile = null;
let panelCount = 1;
let userInfo = {};

// Load user info + styles
async function init() {
    const [meRes, stylesRes] = await Promise.all([
        CF.apiFetch('/api/me'),
        CF.apiFetch('/api/styles')
    ]);

    if (meRes.ok) {
        userInfo = meRes.data;
        const li = userInfo.limit_info;
        document.getElementById('usageDisplay').innerHTML = `已用 <strong>${li.used}</strong>/${li.limit} 格`;
        document.getElementById('planBadge').textContent = li.plan.toUpperCase();
    }

    if (stylesRes.ok) {
        const styles = stylesRes.data;
        selectedStyle = styles[0].id;
        document.getElementById('styleGrid').innerHTML = styles.map((s, i) => `
            <div class="style-opt ${i === 0 ? 'sel' : ''}" data-style="${s.id}" onclick="selStyle(this)">
                <span class="emoji">${s.preview}</span>
                ${s.name}
            </div>
        `).join('');
    }
}
init();

// Character upload
document.getElementById('charInput').addEventListener('change', async e => {
    if (!e.target.files.length) return;
    charFile = e.target.files[0];
    const fd = new FormData();
    fd.append('image', charFile);
    fd.append('name', '我的角色');
    const { ok, data } = await CF.apiFetch('/api/character/upload', { method: 'POST', body: fd });
    if (ok && data.success) {
        document.getElementById('charImg').src = CF.api + data.image;
        document.getElementById('charName').textContent = data.name;
        document.getElementById('charUpload').style.display = 'none';
        document.getElementById('charPreview').style.display = 'block';
        window._charId = data.id;
    }
});

function selStyle(el) {
    document.querySelectorAll('.style-opt').forEach(s => s.classList.remove('sel'));
    el.classList.add('sel');
    selectedStyle = el.dataset.style;
}

function addPanel() {
    panelCount++;
    const div = document.createElement('div');
    div.className = 'panel-editor';
    div.dataset.idx = panelCount - 1;
    div.innerHTML = `
        <div class="panel-num">第 ${panelCount} 格</div>
        <textarea class="desc" placeholder="描述這格的場景和動作..."></textarea>
        <textarea class="dialogue" placeholder="對話（選填）"></textarea>
    `;
    document.getElementById('panelList').appendChild(div);
}

async function generate() {
    const descs = [];
    document.querySelectorAll('.panel-editor').forEach(el => {
        descs.push({
            description: el.querySelector('.desc').value,
            dialogue: el.querySelector('.dialogue').value
        });
    });

    if (!descs.some(d => d.description)) return alert('請至少輸入一格描述！');

    const btn = document.getElementById('genBtn');
    const res = document.getElementById('result');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner spin"></i> 生成中...';
    res.innerHTML = '<div class="empty"><i class="fa-solid fa-spinner spin" style="font-size:2.5rem;color:var(--accent);"></i><p>AI 正在繪製漫畫...</p><p id="progressText" style="font-size:.85rem;color:var(--muted);margin-top:8px;"></p></div>';

    try {
        // Use async endpoint
        const { ok, data } = await CF.apiFetch('/api/comic/create-async', {
            method: 'POST',
            body: {
                title: '我的漫畫',
                style: selectedStyle,
                character_id: window._charId || null,
                panels: descs
            }
        });

        if (ok && data.success) {
            window._currentProjId = data.id;
            pollProgress(data.id);
        } else {
            res.innerHTML = `<div class="empty"><p style="color:#ef4444;">${data.error || '生成失敗'}</p></div>`;
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> 生成漫畫';
        }
    } catch(e) {
        res.innerHTML = `<div class="empty"><p style="color:#ef4444;">錯誤：${e.message}</p></div>`;
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> 生成漫畫';
    }
}

async function pollProgress(projId) {
    const interval = setInterval(async () => {
        try {
            const cr = await CF.apiFetch('/api/comic/' + projId);
            if (cr.ok) {
                const cd = cr.data;
                const pt = document.getElementById('progressText');
                if (pt) pt.textContent = `進度：${cd.completed_panels}/${cd.total_panels} 格 (${cd.progress}%)`;

                if (cd.status === 'done') {
                    clearInterval(interval);
                    showComicResult(cd);
                    if (cd.limit_info) {
                        document.getElementById('usageDisplay').innerHTML = `已用 <strong>${cd.limit_info.used}</strong>/${cd.limit_info.limit} 格`;
                    }
                    const btn = document.getElementById('genBtn');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> 生成漫畫';
                } else if (cd.status === 'error') {
                    clearInterval(interval);
                    document.getElementById('result').innerHTML = `<div class="empty"><p style="color:#ef4444;">生成過程發生錯誤，請重試</p></div>`;
                    const btn = document.getElementById('genBtn');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> 生成漫畫';
                }
            }
        } catch(e) {
            // Continue polling
        }
    }, 2000); // Poll every 2 seconds
}

function showComicResult(cd) {
    const res = document.getElementById('result');
    let html = '<div class="comic-grid">';
    cd.panels.forEach(p => {
        const imgUrl = p.url ? CF.api + p.url : '';
        html += `<div class="comic-panel">
            ${imgUrl ? `<img src="${imgUrl}" alt="Panel ${p.num}" loading="lazy">` : '<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);"><i class="fa-solid fa-xmark"></i></div>'}
            <div class="meta">第 ${p.num} 格 ${p.dialogue ? '· 💬 有對話' : ''}</div>
        </div>`;
    });
    html += '</div>';
    res.innerHTML = html;
    document.getElementById('exportBar').style.display = 'flex';
}

// AI Script Generation
async function aiGenerate() {
    const premise = document.getElementById('premiseInput').value.trim();
    if (!premise) return alert('請輸入故事前提！');

    const btn = document.getElementById('aiBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner spin"></i> 生成劇本中...';

    try {
        const numPanels = parseInt(document.getElementById('aiPanelCount').value);
        const { ok, data } = await CF.apiFetch('/api/script/generate', {
            method: 'POST',
            body: { premise, panels: numPanels, style: selectedStyle }
        });

        if (ok && data.success) {
            // Clear existing panels and fill with AI-generated ones
            const panelList = document.getElementById('panelList');
            panelList.innerHTML = '';
            panelCount = 0;

            data.panels.forEach((p, i) => {
                panelCount++;
                const div = document.createElement('div');
                div.className = 'panel-editor';
                div.dataset.idx = i;
                div.innerHTML = `
                    <div class="panel-num">第 ${panelCount} 格</div>
                    <textarea class="desc" placeholder="描述這格的場景和動作...">${p.description || ''}</textarea>
                    <textarea class="dialogue" placeholder="對話（選填）">${p.dialogue || ''}</textarea>
                `;
                panelList.appendChild(div);
            });
        } else {
            alert(data.error || 'AI 劇本生成失敗');
        }
    } catch(e) {
        alert('錯誤：' + e.message);
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-hat-wizard"></i> 自動生成分鏡';
}

// Export
let currentProjId = null;
async function exportComic(layout) {
    const projId = window._currentProjId;
    if (!projId) return alert('請先生成漫畫！');

    try {
        const { ok, data } = await CF.apiFetch(`/api/comic/${projId}/export`, {
            method: 'POST',
            body: { layout }
        });
        if (ok && data.success) {
            window.open(CF.api + data.url, '_blank');
        } else {
            alert(data.error || '匯出失敗');
        }
    } catch(e) {
        alert('匯出錯誤：' + e.message);
    }
}
